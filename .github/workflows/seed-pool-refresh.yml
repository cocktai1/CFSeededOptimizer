name: CF Seed Pool Refresh

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'Target city for location-aware harvesting'
        required: false
        default: '成都'
        type: choice
        options:
          - 成都
          - 北京
          - 上海
          - 广州
          - 深圳
          - 杭州
          - 南京
          - 武汉
          - 西安
          - 重庆
          - 苏州
          - 天津
      isp:
        description: 'Target ISP type'
        required: false
        default: '电信'
        type: choice
        options:
          - 电信
          - 联通
          - 移动
          - 铁通
          - 教育网
      speed_preference:
        description: 'Speed preference level'
        required: false
        default: 'balanced'
        type: choice
        options:
          - ultra_fast
          - fast
          - balanced
          - stable
      network_type:
        description: 'Network type'
        required: false
        default: 'fixed'
        type: choice
        options:
          - fixed
          - 4g
          - 5g
      enable_location_aware:
        description: 'Enable location-aware ITDog harvesting'
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '15 */12 * * *'

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CF_SEED_DOMAINS: ${{ vars.CF_SEED_DOMAINS || 'time.cloudflare.com,speed.cloudflare.com,cdnjs.cloudflare.com,www.cloudflare.com,developers.cloudflare.com,workers.cloudflare.com,one.one.one.one,shopee.sg,shopee.tw,icook.tw,www.digitalocean.com,cloudflare.steamstatic.com' }}
      CF_MAX_SEED_DOMAINS: ${{ vars.CF_MAX_SEED_DOMAINS || '12' }}
      CF_SEED_POOL_LIMIT: ${{ vars.CF_SEED_POOL_LIMIT || '80' }}
      CF_HARVEST_STRATEGIES: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.enable_location_aware == 'false') && 'dns,public_repo' || vars.CF_HARVEST_STRATEGIES || 'dns,itdog_location,public_repo' }}
      CF_PUBLIC_REPO_URLS: ${{ vars.CF_PUBLIC_REPO_URLS || 'https://cdn.jsdelivr.net/gh/ymyuuu/IPDB@main/bestcf.txt' }}
      CF_PUBLIC_REPO_TIMEOUT: ${{ vars.CF_PUBLIC_REPO_TIMEOUT || '6' }}
      CF_HARVEST_CITY: ${{ github.event.inputs.city || vars.CF_HARVEST_CITY || '成都' }}
      CF_HARVEST_ISP: ${{ github.event.inputs.isp || vars.CF_HARVEST_ISP || '电信' }}
      CF_HARVEST_SPEED_PREFERENCE: ${{ github.event.inputs.speed_preference || vars.CF_HARVEST_SPEED_PREFERENCE || 'balanced' }}
      CF_HARVEST_NETWORK_TYPE: ${{ github.event.inputs.network_type || vars.CF_HARVEST_NETWORK_TYPE || 'fixed' }}
      CF_HARVEST_PREFER_FRESH: ${{ vars.CF_HARVEST_PREFER_FRESH || 'true' }}
      CF_OUTPUT_FILE: data/seed_pool.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install optional dependencies for location-aware harvesting
        if: contains(env.CF_HARVEST_STRATEGIES, 'itdog_location')
        run: |
          pip install requests

      - name: Harvest Cloudflare seed pool
        run: |
          python tools/seed_pool_harvest.py

      - name: Commit refreshed seed pool
        run: |
          if git diff --quiet -- data/seed_pool.json; then
            echo "No seed pool changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seed_pool.json
          git commit -m "chore: refresh CF seed pool"
          git push
